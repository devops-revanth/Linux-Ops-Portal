# =============================================================================
# Linux Operations Portal — Ansible Inventory
# =============================================================================
#
# HOW TO USE
# ----------
# 1. Replace example hostnames with your real server FQDNs or IPs.
# 2. The playbook automatically parses the hostname to derive:
#      site, app code, OS, and environment — NO manual classification needed
#      for servers that follow the naming convention:
#        <site:4><app:3><os:1><env:1><sequence>
#        Example: usegnbxlt001 (site=USEG, app=NBX, OS=Rocky, env=Test)
# 3. For servers NOT following the convention, set:
#      lop_location, lop_environment per host or group as a fallback.
# 4. Set lop_owner per host or group as needed.
# 5. Set lop_api_url and lop_api_token in group_vars/all.yml.
#    Use Ansible Vault in production — NEVER commit a real token.
# 6. Run:
#       ansible-playbook -i inventory.ini inventory_sync.yml
#
# HOSTNAME CONVENTION
# -------------------
# Position  Length  Example  Meaning
# 0-3       4       useg     Site code  → USEG
# 4-6       3       nbx      App code   → NBX
# 7         1       l        OS         → L=Rocky Linux, R=RHEL
# 8         1       p        Env        → P=Production S=Stage T=Test D=Development E=Demo
# 9+        varies  001      Sequence
#
# ENV FALLBACK (for non-standard hostnames)
# -----------------------------------------
# lop_environment : Accepted values: Production, Development, Stage, Test, Demo
# lop_location    : Must match a Location name in LOP (e.g. USEG, DEFR, UKDL)
# =============================================================================

# ── Production servers (hostname-parsed classification) ────────────────────
[production]
usegnbxlp001.example.com   lop_owner="Platform Engineering"
usegnbxlp002.example.com   lop_owner="Platform Engineering"
usegecclp001.example.com   lop_owner="DBA Team"

# ── Stage servers (hostname-parsed classification) ─────────────────────────
[staging]
usegnbxls001.example.com   lop_owner="Platform Engineering"

# ── Development servers (hostname-parsed classification) ───────────────────
[development]
usegnbxld001.example.com   lop_owner="Dev Team"

# ── Legacy servers (non-standard hostnames — manual classification) ─────────
[legacy]
web01.example.com    lop_location="USEG"  lop_environment="Production"  lop_owner="Platform Engineering"
db01.example.com     lop_location="USEG"  lop_environment="Production"  lop_owner="DBA Team"

# ── Group variables (applies to all groups) ────────────────────────────────
# lop_api_url and lop_api_token come from group_vars/all.yml.
[all:vars]
ansible_user=ansible
ansible_become=false
