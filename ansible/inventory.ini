# ============================================================
# Linux Operations Portal — Ansible Inventory
# ============================================================
#
# This file defines the servers Ansible will connect to via SSH
# and gather facts from before pushing to the LOP REST API.
#
# HOW TO USE
# ----------
# 1. Replace example hostnames with your real server FQDNs or IPs.
# 2. Set lop_location, lop_environment, lop_owner per host or group
#    to classify servers in the portal automatically.
# 3. Set lop_api_url and lop_api_token in group_vars/all.yml.
#    Do NOT commit a real token — use Ansible Vault in production.
# 4. Run:
#       ansible-playbook -i inventory.ini inventory_sync.yml
#
# API URL CONFIGURATION
# ---------------------
# The portal base URL is set in group_vars/all.yml:
#   lop_api_url: "https://your-lop-host.example.com"
#
# Override at runtime with -e:
#   ansible-playbook -i inventory.ini inventory_sync.yml \
#     -e lop_api_url=https://lop.example.com \
#     -e lop_api_token=<token>
# ============================================================

# ── Production servers ─────────────────────────────────────────────────
[production]
web01.example.com   lop_location="USEG"  lop_environment="Production"  lop_owner="Platform Engineering"  lop_patch_status="up-to-date"
web02.example.com   lop_location="USEG"  lop_environment="Production"  lop_owner="Platform Engineering"  lop_patch_status="up-to-date"
db01.example.com    lop_location="USEG"  lop_environment="Production"  lop_owner="DBA Team"              lop_patch_status="pending"
db02.example.com    lop_location="APAC"  lop_environment="Production"  lop_owner="DBA Team"              lop_patch_status="pending"

# ── Staging servers ────────────────────────────────────────────────────
[staging]
stg-web01.example.com  lop_location="USEG"  lop_environment="Staging"  lop_owner="Platform Engineering"
stg-db01.example.com   lop_location="USEG"  lop_environment="Staging"  lop_owner="DBA Team"

# ── Development servers ────────────────────────────────────────────────
[development]
dev01.example.com  lop_location="USEG"  lop_environment="Development"  lop_owner="Dev Team"

# ── Group variables (applies to all groups) ────────────────────────────
# Override per-group or per-host as needed.
# lop_api_url and lop_api_token come from group_vars/all.yml.
[all:vars]
ansible_user=ansible
ansible_become=false
