---
# =============================================================================
# LOP Inventory Sync
# Task: updates.yml
#
# Purpose:
#   Collect available package updates for supported Linux distributions.
#
# Supported:
#   - RHEL / Rocky Linux / AlmaLinux / Oracle Linux / CentOS Stream
#   - Ubuntu / Debian
#
# This task NEVER installs updates.
# =============================================================================

# ── Initialise update facts (safe defaults) ────────────────────────────────

- name: Initialize update facts
  ansible.builtin.set_fact:
    lop_updates:
      total: 0
      security: 0
      bugfix: 0
      enhancement: 0
      kernel: false
      packages: []

###############################################################################
# RHEL Family  (dnf)
###############################################################################

- name: Check available updates (RHEL family)
  ansible.builtin.command:
    cmd: dnf check-update
  register: dnf_updates
  # dnf check-update exits 100 when updates are available — not an error
  changed_when: false
  failed_when: dnf_updates.rc not in [0, 100]
  when: ansible_os_family == "RedHat"

- name: Parse available packages (RHEL family)
  ansible.builtin.set_fact:
    lop_updates: >-
      {{
        lop_updates | combine({
          'total': dnf_updates.stdout_lines
                   | select('match', '^[A-Za-z0-9]')
                   | reject('match', '^Last metadata')
                   | list | length,
          'packages': dnf_updates.stdout_lines
                      | select('match', '^[A-Za-z0-9]')
                      | reject('match', '^Last metadata')
                      | list
        })
      }}
  when: ansible_os_family == "RedHat"

- name: Collect security advisories (RHEL family)
  ansible.builtin.command:
    cmd: dnf updateinfo list security
  register: security_updates
  changed_when: false
  failed_when: false
  when: ansible_os_family == "RedHat"

- name: Count security updates (RHEL family)
  ansible.builtin.set_fact:
    lop_updates: >-
      {{
        lop_updates | combine({
          'security': security_updates.stdout_lines
                      | select('search', '/Sec\.')
                      | list | length
        })
      }}
  when: ansible_os_family == "RedHat"

- name: Collect bugfix advisories (RHEL family)
  ansible.builtin.command:
    cmd: dnf updateinfo list bugfix
  register: bugfix_updates
  changed_when: false
  failed_when: false
  when: ansible_os_family == "RedHat"

- name: Count bugfix updates (RHEL family)
  ansible.builtin.set_fact:
    lop_updates: >-
      {{
        lop_updates | combine({
          'bugfix': bugfix_updates.stdout_lines
                    | select('search', '/Bug\.')
                    | list | length
        })
      }}
  when: ansible_os_family == "RedHat"

- name: Collect enhancement advisories (RHEL family)
  ansible.builtin.command:
    cmd: dnf updateinfo list enhancement
  register: enhancement_updates
  changed_when: false
  failed_when: false
  when: ansible_os_family == "RedHat"

- name: Count enhancement updates (RHEL family)
  ansible.builtin.set_fact:
    lop_updates: >-
      {{
        lop_updates | combine({
          'enhancement': enhancement_updates.stdout_lines
                         | select('search', '/Enh\.')
                         | list | length
        })
      }}
  when: ansible_os_family == "RedHat"

- name: Detect kernel update available (RHEL family)
  ansible.builtin.set_fact:
    lop_updates: >-
      {{
        lop_updates | combine({
          'kernel': (
            lop_updates.packages
            | select('match', '^(' + (kernel_package_patterns | join('|')) + ')')
            | list | length
          ) > 0
        })
      }}
  when: ansible_os_family == "RedHat"

###############################################################################
# Debian Family  (apt)
###############################################################################

- name: Refresh apt cache (Debian family)
  ansible.builtin.command:
    cmd: apt-get update -qq
  changed_when: false
  failed_when: false
  when: ansible_os_family == "Debian"

- name: List upgradable packages (Debian family)
  ansible.builtin.command:
    # LANG=C ensures consistent output regardless of system locale
    cmd: env LANG=C apt list --upgradable
  register: apt_updates
  changed_when: false
  failed_when: false
  when: ansible_os_family == "Debian"

- name: Parse Debian updates
  ansible.builtin.set_fact:
    lop_updates: >-
      {{
        lop_updates | combine({
          'total': apt_updates.stdout_lines[1:] | length,
          'packages': apt_updates.stdout_lines[1:],
          'kernel': apt_updates.stdout is search('linux-image')
        })
      }}
  when: ansible_os_family == "Debian"

- name: Count security updates (Debian family)
  ansible.builtin.set_fact:
    lop_updates: >-
      {{
        lop_updates | combine({
          'security': apt_updates.stdout_lines[1:]
                      | select('search', '-security')
                      | list | length
        })
      }}
  when: ansible_os_family == "Debian"

###############################################################################
# Structured available-package list
#
# Produces lop_available_packages — a list of dicts suitable for the
# LOP API's updates.available_packages field.
#
# Each dict contains:
#   name              — package name
#   arch              — CPU architecture
#   available_version — version string of the available update
#   repository        — source repository
#
# RHEL: re-runs dnf check-update piped directly through Python.
#   The metadata is already refreshed from the earlier check-update task,
#   so this call is fast and uses the local cache.  We avoid dnf repoquery
#   --upgrades here because it can return empty results when the cache is
#   stale or a broken dependency prevents the best-candidate resolution.
#
# Debian: parsed from the apt list --upgradable output.
###############################################################################

# ── RHEL family ───────────────────────────────────────────────────────────
#
# dnf check-update exits 100 when updates exist (not an error).
# We suppress its non-zero exit using "|| true" inside the subshell so the
# pipe to python3 always succeeds.
#
# dnf check-update output format (one package per line):
#   name.arch    version-release    repository

- name: Parse structured available packages (RHEL family)
  ansible.builtin.shell: |
    { dnf check-update -q 2>/dev/null || true; } | python3 -c "
    import sys, json, re
    packages = []
    for line in sys.stdin:
        line = line.rstrip()
        if not line or not re.match(r'^[A-Za-z0-9]', line):
            continue
        if line.startswith('Last metadata'):
            continue
        parts = line.split()
        if len(parts) < 2:
            continue
        name_arch = parts[0]
        version   = parts[1]
        repo      = parts[2] if len(parts) > 2 else ''
        dot = name_arch.rfind('.')
        if dot > 0:
            name = name_arch[:dot]
            arch = name_arch[dot+1:]
        else:
            name = name_arch
            arch = ''
        packages.append({
            'name':              name,
            'available_version': version,
            'arch':              arch,
            'repository':        repo,
        })
    print(json.dumps(packages))
    "
  args:
    executable: /bin/bash
  register: dnf_structured_raw
  changed_when: false
  failed_when: false
  when: ansible_os_family == "RedHat"

- name: Set structured available packages (RHEL family)
  ansible.builtin.set_fact:
    lop_available_packages: "{{ dnf_structured_raw.stdout | from_json }}"
  when: ansible_os_family == "RedHat"

# ── Debian family ─────────────────────────────────────────────────────────

- name: Get structured available updates (Debian family)
  ansible.builtin.shell: |
    env LANG=C apt list --upgradable 2>/dev/null | python3 -c "
    import sys, json
    packages = []
    for line in sys.stdin:
        line = line.strip()
        if not line or line.startswith('Listing'):
            continue
        # Format: name/suite version arch [upgradable from: old_version]
        try:
            name_suite, rest = line.split(' ', 1)
            name = name_suite.split('/')[0]
            parts = rest.split()
            available_version = parts[0] if parts else ''
            arch = parts[1] if len(parts) > 1 else ''
            packages.append({
                'name': name,
                'available_version': available_version,
                'arch': arch,
                'repository': ''
            })
        except Exception:
            continue
    print(json.dumps(packages))
    " || echo '[]'
  args:
    executable: /bin/bash
  register: apt_structured_raw
  changed_when: false
  failed_when: false
  when: ansible_os_family == "Debian"

- name: Set structured available packages (Debian family)
  ansible.builtin.set_fact:
    lop_available_packages: "{{ apt_structured_raw.stdout | from_json }}"
  when: ansible_os_family == "Debian"

# ── Default (unsupported OS) ───────────────────────────────────────────────

- name: Set empty available packages for unsupported OS
  ansible.builtin.set_fact:
    lop_available_packages: []
  when: ansible_os_family not in ["RedHat", "Debian"]

###############################################################################
# Merge structured list into lop_updates
###############################################################################

- name: Merge structured available_packages into lop_updates
  ansible.builtin.set_fact:
    lop_updates: >-
      {{
        lop_updates | combine({
          'available_packages': lop_available_packages | default([])
        })
      }}

###############################################################################
# Merge into LOP facts
###############################################################################

- name: Merge update information into LOP facts
  ansible.builtin.set_fact:
    lop_facts: >-
      {{
        lop_facts | combine({
          'updates': lop_updates
        }, recursive=True)
      }}

###############################################################################
# Summary
###############################################################################

- name: Display update summary
  ansible.builtin.debug:
    msg:
      - "Total Updates       : {{ lop_updates.total }}"
      - "Security Updates    : {{ lop_updates.security }}"
      - "Bugfix Updates      : {{ lop_updates.bugfix }}"
      - "Enhancements        : {{ lop_updates.enhancement }}"
      - "Kernel Update       : {{ lop_updates.kernel }}"
      - "Structured Packages : {{ lop_available_packages | default([]) | length }}"
