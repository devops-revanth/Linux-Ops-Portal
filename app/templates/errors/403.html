{% extends "base.html" %}

{% block title %}403 Forbidden – {{ app_name }}{% endblock %}

{% block content %}
<div class="container-fluid p-4">
  <div class="text-center py-5">
    <div class="display-1 fw-bold text-warning">403</div>
    <h4 class="mt-3 mb-2">Access Forbidden</h4>
    <p class="text-secondary">You do not have permission to access this resource.</p>
    <a href="{{ url_for('main.index') }}" class="btn btn-primary mt-3">
      <i class="bi bi-house me-2"></i>Back to Portal
    </a>
  </div>
</div>
{% endblock %}
