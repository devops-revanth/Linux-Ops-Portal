{% extends "base.html" %}

{% block title %}404 Not Found – {{ app_name }}{% endblock %}

{% block content %}
<div class="container-fluid p-4">
  <div class="text-center py-5">
    <div class="display-1 fw-bold text-secondary">404</div>
    <h4 class="mt-3 mb-2">Page Not Found</h4>
    <p class="text-secondary">The page you requested does not exist or has been moved.</p>
    <a href="{{ url_for('main.index') }}" class="btn btn-primary mt-3">
      <i class="bi bi-house me-2"></i>Back to Portal
    </a>
  </div>
</div>
{% endblock %}
