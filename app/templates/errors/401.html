<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>401 Unauthorized – Linux Operations Portal</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous" />
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    :root { --lop-bg: #0d1117; --lop-surface: #161b22; --lop-border: #30363d; }
    body {
      background: var(--lop-bg);
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .lop-error-card {
      background: var(--lop-surface);
      border: 1px solid var(--lop-border);
      border-radius: 12px;
      padding: 3rem 2.5rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }
    .lop-error-code {
      font-size: 5rem;
      font-weight: 800;
      line-height: 1;
      color: #3fb950;
      letter-spacing: -0.03em;
    }
    .lop-error-icon {
      font-size: 2.5rem;
      color: #8b949e;
      margin: 0.75rem 0;
    }
    .lop-brand {
      font-size: .8rem;
      color: #8b949e;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
    }
  </style>
</head>
<body>
  <div class="lop-error-card">
    <div class="lop-brand">
      <i class="bi bi-terminal-fill text-success"></i>
      <span>Linux Operations Portal</span>
    </div>
    <div class="lop-error-code">401</div>
    <div class="lop-error-icon"><i class="bi bi-shield-lock-fill"></i></div>
    <h4 class="fw-semibold mb-2">Unauthorized</h4>
    <p class="text-secondary mb-4">
      You must be signed in to access this resource.
    </p>
    <a href="/login" class="btn btn-success px-4">
      <i class="bi bi-box-arrow-in-right me-2"></i>Sign in
    </a>
  </div>
</body>
</html>
