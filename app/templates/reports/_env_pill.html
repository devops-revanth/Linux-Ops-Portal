{# Environment pill — requires srv in context #}
{% if srv.environment %}
  <span class="lop-env-pill
    {% if srv.environment.color == 'primary'   %} bg-primary-subtle   text-primary
    {% elif srv.environment.color == 'danger'  %} bg-danger-subtle    text-danger
    {% elif srv.environment.color == 'warning' %} bg-warning-subtle   text-warning
    {% elif srv.environment.color == 'info'    %} bg-info-subtle      text-info
    {% elif srv.environment.color == 'success' %} bg-success-subtle   text-success
    {% else %}                                     bg-secondary-subtle text-secondary
    {% endif %}">{{ srv.environment.label }}</span>
{% else %}
  <span class="text-secondary">—</span>
{% endif %}
