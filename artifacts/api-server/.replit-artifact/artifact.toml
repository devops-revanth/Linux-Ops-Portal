kind = "api"
previewPath = "/"
title = "Linux Operations Portal"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

# ── Flask LOP (served at root) ────────────────────────────────────────────────
[[services]]
localPort = 5000
name = "LOP"
paths = ["/"]

[services.development]
run = "cd /home/runner/workspace && python run.py"

[services.production]

[services.production.run]
args = ["bash", "-c", "cd /home/runner/workspace && .pythonlibs/bin/gunicorn --bind 0.0.0.0:${PORT:-5000} --workers 1 --timeout 120 run:app"]

[services.production.run.env]
FLASK_ENV = "production"

[services.production.health.startup]
path = "/health"

# ── Node.js API Server ────────────────────────────────────────────────────────
[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
