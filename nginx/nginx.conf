# ─────────────────────────────────────────────────────────────────────────────
# Linux Operations Portal — Nginx Reverse Proxy Configuration
#
# Place this file at /etc/nginx/sites-available/lop and symlink:
#   ln -s /etc/nginx/sites-available/lop /etc/nginx/sites-enabled/lop
#
# Replace "your-domain.example.com" with the real FQDN.
# For TLS, use certbot: sudo certbot --nginx -d your-domain.example.com
# ─────────────────────────────────────────────────────────────────────────────

upstream lop_app {
    server 127.0.0.1:5000;
    keepalive 32;
}

# Redirect plain HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.example.com;

    # Let's Encrypt challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main portal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.example.com;

    # TLS certificates (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/your-domain.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # File upload limit (covers CSV imports, if added later)
    client_max_body_size 16M;

    # Access logs
    access_log /var/log/nginx/lop_access.log;
    error_log  /var/log/nginx/lop_error.log warn;

    # Proxy to Gunicorn
    location / {
        proxy_pass         http://lop_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Static files served directly by nginx (optional — speeds up delivery)
    location /static/ {
        alias /app/app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
